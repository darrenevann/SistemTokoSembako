<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transaksi Penjualan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokopedia-theme.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-toko sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard">Sistem Sembako</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-4">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/barang">Barang</a></li>
                <li class="nav-item"><a class="nav-link" href="/stok">Stok</a></li>
                <li class="nav-item"><a class="nav-link active" href="/transaksi">Transaksi</a></li>
                <li class="nav-item"><a class="nav-link" href="/pelanggan">Pelanggan</a></li>
                <li class="nav-item"><a class="nav-link" href="/laporan/keuangan">Laporan</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-danger fw-bold" href="/logout">Keluar</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-5 mt-4">
    <h3 class="mb-4 fw-bold">Kasir & Transaksi</h3>

    <div th:if="${error}" class="alert alert-danger fw-bold border-0" style="border-radius: 8px;">
        <span th:text="${error}"></span>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card-toko p-4">
                <h5 class="fw-bold mb-4">Buat Transaksi Baru</h5>
                <form action="/transaksi/simpan" method="post">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">Tanggal Transaksi</label>
                        <input type="date" class="form-control form-control-toko" name="tanggalTransaksi" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">Pilih Pelanggan</label>
                        <select class="form-select form-control-toko" name="pelanggan.idPelanggan" required>
                            <option value="">-- Pilih Pelanggan --</option>
                            <option th:each="p : ${pelangganList}" th:value="${p.idPelanggan}" th:text="${p.namaPelanggan}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">Pilih Barang</label>
                        <select class="form-select form-control-toko" name="barang.idBarang" required>
                            <option value="">-- Pilih Barang --</option>
                            <option th:each="b : ${barangList}" th:value="${b.idBarang}" th:text="${b.namaBarang} + ' (Rp ' + ${b.hargaSatuan} + ')'"></option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold small">Kuantitas</label>
                            <input type="number" class="form-control form-control-toko" name="kuantitas" min="1" placeholder="Jumlah" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-muted fw-bold small">Pembayaran</label>
                            <select class="form-select form-control-toko" name="metodePembayaran">
                                <option value="Cash">Cash</option>
                                <option value="QRIS">QRIS</option>
                                <option value="Transfer">Transfer</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn-toko w-100 py-2 fs-5">Proses Pembayaran</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card-toko border-0">
                <div class="card-header-toko">Riwayat Transaksi</div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-toko mb-0">
                            <thead>
                            <tr>
                                <th class="ps-4">No. Transaksi</th>
                                <th>Pelanggan</th>
                                <th>Detail Barang</th>
                                <th>Total Pembayaran</th>
                                <th class="pe-4 text-end">Aksi</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="t : ${transaksiList}">
                                <td class="ps-4">
                                    <p class="mb-0 fw-bold" th:text="${t.idTransaksi}"></p>
                                    <small class="text-muted" th:text="${t.tanggalTransaksi}"></small>
                                </td>
                                <td class="fw-bold" th:text="${t.pelanggan.namaPelanggan}"></td>
                                <td>
                                    <span th:text="${t.barang.namaBarang}"></span> <br>
                                    <small class="text-muted fw-bold" th:text="'Qty: ' + ${t.kuantitas}"></small>
                                </td>
                                <td>
                                    <p class="mb-0 fw-bold text-success" th:text="'Rp ' + ${#numbers.formatDecimal(t.totalHarga, 0, 'COMMA', 0, 'POINT')}"></p>
                                    <span class="badge bg-secondary" th:text="${t.metodePembayaran}"></span>
                                </td>
                                <td class="pe-4 text-end">
                                    <a class="btn btn-toko-outline btn-sm" style="font-size: 12px;" th:href="@{/transaksi/struk/{id}(id=${t.idTransaksi})}">Cetak Struk</a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
