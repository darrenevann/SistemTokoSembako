<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Transaksi Penjualan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/dashboard">

            Sistem Sembako

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon">
            </span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav">


                <li class="nav-item">
                    <a class="nav-link active"
                       href="/transaksi">
                        Transaksi
                    </a>
                </li>





                <li class="nav-item">
                    <a class="nav-link"
                       href="/pelanggan">
                        Pelanggan
                    </a>
                </li>
                

                <li class="nav-item">
                    <a class="nav-link text-danger"
                       href="/logout">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-4">

    <h2>Transaksi Penjualan</h2>

    <div th:if="${error}"
         class="alert alert-danger">

        <span th:text="${error}">
        </span>

    </div>

    <div class="card">

        <div class="card-header">

            Form Transaksi

        </div>

        <div class="card-body">

            <form action="/transaksi/simpan"
                  method="post">


                <input type="date"
                       class="form-control mb-2"
                       name="tanggalTransaksi"
                       required>

                <select class="form-control mb-2"
                        name="pelanggan.idPelanggan"
                        required>

                    <option value="">
                        Pilih Pelanggan
                    </option>

                    <option th:each="p : ${pelangganList}"
                            th:value="${p.idPelanggan}"
                            th:text="${p.namaPelanggan}">
                    </option>

                </select>

                <select class="form-control mb-2"
                        name="barang.idBarang"
                        required>

                    <option value="">
                        Pilih Barang
                    </option>

                    <option th:each="b : ${barangList}"
                            th:value="${b.idBarang}"
                            th:text="${b.namaBarang}">
                    </option>

                </select>

                <input type="number"
                       class="form-control mb-2"
                       name="kuantitas"
                       min="1"
                       placeholder="Jumlah Beli"
                       required>

                <select class="form-control mb-3"
                        name="metodePembayaran">

                    <option value="Cash">
                        Cash
                    </option>

                    <option value="QRIS">
                        QRIS
                    </option>

                    <option value="Transfer">
                        Transfer
                    </option>

                </select>

                <button class="btn btn-success">

                    Bayar

                </button>

            </form>

        </div>

    </div>

    <br>

    <div class="card">

        <div class="card-header">

            Riwayat Transaksi

        </div>

        <div class="card-body">

            <table class="table table-bordered table-striped">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Tanggal</th>
                    <th>Pelanggan</th>
                    <th>Barang</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Pembayaran</th>
                    <th>Aksi</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="t : ${transaksiList}">

                    <td th:text="${t.idTransaksi}">
                    </td>

                    <td th:text="${t.tanggalTransaksi}">
                    </td>

                    <td th:text="${t.pelanggan.namaPelanggan}">
                    </td>

                    <td th:text="${t.barang.namaBarang}">
                    </td>

                    <td th:text="${t.kuantitas}">
                    </td>

                    <td>

                        Rp.

                        <span th:text="${t.totalHarga}">
                        </span>

                    </td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${t.metodePembayaran}">
                        </span>

                    </td>

                    <td>

                        <a class="btn btn-primary btn-sm"
                           th:href="@{/transaksi/struk/{id}(id=${t.idTransaksi})}">

                            Cetak Struk

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
