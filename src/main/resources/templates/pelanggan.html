<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Data Pelanggan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/dashboard">

            Sistem Sembako

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon">
            </span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav">


                <li class="nav-item">
                    <a class="nav-link active"
                       href="/transaksi">
                        Transaksi
                    </a>
                </li>





                <li class="nav-item">
                    <a class="nav-link"
                       href="/pelanggan">
                        Pelanggan
                    </a>
                </li>
                

                <li class="nav-item">
                    <a class="nav-link text-danger"
                       href="/logout">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<body>

    
<div class="container mt-4">

<h2>Data Pelanggan</h2>

<div class="card">

    <div class="card-body">

        <form action="/pelanggan/add"
              method="post">


            <input class="form-control mb-2"
                   name="namaPelanggan"
                   placeholder="Nama Pelanggan"
                   required>

            <input class="form-control mb-2"
                   name="nomorTelepon"
                   placeholder="Nomor Telepon"
                   required>

            <textarea class="form-control mb-3"
                      name="alamat"
                      placeholder="Alamat"
                      required>
            </textarea>

            <button class="btn btn-success">

                Tambah Pelanggan

            </button>

        </form>

    </div>

</div>

<br>

<div class="card">

    <div class="card-body">

        <h4>Daftar Pelanggan</h4>

        <table class="table table-bordered">

            <thead>

            <tr>

                <th>ID</th>
                <th>Nama</th>
                <th>No Telepon</th>
                <th>Alamat</th>
                <th>Aksi</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="p : ${pelangganList}">

                <td th:text="${p.idPelanggan}">
                </td>

                <td th:text="${p.namaPelanggan}">
                </td>

                <td th:text="${p.nomorTelepon}">
                </td>

                <td th:text="${p.alamat}">
                </td>

                <td>

                    <a class="btn btn-danger btn-sm"
                       th:href="@{/pelanggan/delete/{id}(id=${p.idPelanggan})}">

                        Hapus

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>


</div>

</body>

</html>
