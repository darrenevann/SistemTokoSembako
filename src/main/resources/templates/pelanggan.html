<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Data Pelanggan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokopedia-theme.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-toko sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard">Sistem Sembako</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-4">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/barang">Barang</a></li>
                <li class="nav-item"><a class="nav-link" href="/stok">Stok</a></li>
                <li class="nav-item"><a class="nav-link" href="/transaksi">Transaksi</a></li>
                <li class="nav-item"><a class="nav-link active" href="/pelanggan">Pelanggan</a></li>
                <li class="nav-item"><a class="nav-link" href="/laporan/keuangan">Laporan</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-danger fw-bold" href="/logout">Keluar</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-5 mt-4">
    <div class="row g-4">
        <div class="col-md-4">
            <h4 class="mb-3 fw-bold">Tambah Pelanggan</h4>
            <div class="card-toko p-4">
                <form action="/pelanggan/add" method="post">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">Nama Lengkap</label>
                        <input class="form-control form-control-toko" name="namaPelanggan" placeholder="Masukkan nama pelanggan" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold small">Nomor Telepon</label>
                        <input class="form-control form-control-toko" name="nomorTelepon" placeholder="Contoh: 08123456789" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold small">Alamat Lengkap</label>
                        <textarea class="form-control form-control-toko" name="alamat" rows="3" placeholder="Masukkan alamat lengkap" required></textarea>
                    </div>
                    <button class="btn-toko w-100 py-2">Simpan Pelanggan</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <h4 class="mb-3 fw-bold">Daftar Pelanggan</h4>
            <div class="card-toko border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-toko mb-0">
                            <thead>
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Informasi Pelanggan</th>
                                <th>Alamat</th>
                                <th class="pe-4 text-end">Aksi</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${pelangganList}">
                                <td class="ps-4 fw-bold text-muted" th:text="${p.idPelanggan}"></td>
                                <td>
                                    <p class="mb-0 fw-bold" th:text="${p.namaPelanggan}"></p>
                                    <small class="text-muted" th:text="${p.nomorTelepon}"></small>
                                </td>
                                <td><span style="font-size: 13px;" th:text="${p.alamat}"></span></td>
                                <td class="pe-4 text-end">
                                    <a class="btn btn-outline-danger btn-sm fw-bold" style="border-radius: 6px;" th:href="@{/pelanggan/delete/{id}(id=${p.idPelanggan})}">Hapus</a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
