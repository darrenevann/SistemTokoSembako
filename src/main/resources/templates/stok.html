<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>


<title>Stok Barang</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">


</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">


<div class="container-fluid">

    <a class="navbar-brand"
       href="/dashboard">

        Sistem Sembako

    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse"
         id="navbarNav">

        <ul class="navbar-nav">

            <li class="nav-item">
                <a class="nav-link"
                   href="/dashboard">
                    Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link"
                   href="/barang">
                    Barang
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link active"
                   href="/stok">
                    Stok
                </a>
            </li>



            <li class="nav-item">
                <a class="nav-link"
                   href="/laporan/keuangan">
                    Laporan Keuangan
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-danger"
                   href="/logout">
                    Logout
                </a>
            </li>

        </ul>

    </div>

</div>


</nav>

<div class="container mt-4">


<h2>Data Stok Barang</h2>

<div class="card">

    <div class="card-body">

        <table class="table table-bordered table-striped">

            <thead class="table-dark">

            <tr>

                <th>ID Barang</th>
                <th>Nama Barang</th>
                <th>Kategori</th>
                <th>Jumlah Stok</th>
                <th>Status</th>
                <th>Tambah</th>
                <th>Kurang</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="s : ${stokList}">

                <td th:text="${s.barang.idBarang}">
                </td>

                <td th:text="${s.barang.namaBarang}">
                </td>

                <td th:text="${s.barang.kategori}">
                </td>

                <td th:text="${s.jumlahStok}">
                </td>

                <td>

                    <span th:if="${s.jumlahStok <= 10}"
                          class="badge bg-danger">

                        Stok Menipis

                    </span>

                    <span th:if="${s.jumlahStok > 10}"
                          class="badge bg-success">

                        Aman

                    </span>

                </td>

                <td>

                    <form th:action="@{/stok/tambah/{id}(id=${s.idStok})}"
                          method="post">

                        <button class="btn btn-success">

                            +

                        </button>

                    </form>

                </td>

                <td>

                    <form th:action="@{/stok/kurang/{id}(id=${s.idStok})}"
                          method="post">

                        <button class="btn btn-danger">

                            -

                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>


</div>

</body>

</html>
