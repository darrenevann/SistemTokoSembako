<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stok Barang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokopedia-theme.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-toko sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard">Sistem Sembako</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-4">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/barang">Barang</a></li>
                <li class="nav-item"><a class="nav-link active" href="/stok">Stok</a></li>
                <li class="nav-item"><a class="nav-link" href="/transaksi">Transaksi</a></li>
                <li class="nav-item"><a class="nav-link" href="/pelanggan">Pelanggan</a></li>
                <li class="nav-item"><a class="nav-link" href="/laporan/keuangan">Laporan</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-danger fw-bold" href="/logout">Keluar</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-5 mt-4">
    <h3 class="mb-4 fw-bold">Manajemen Stok Barang</h3>

    <div class="card-toko border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-toko mb-0 text-center align-middle">
                    <thead>
                    <tr>
                        <th class="ps-4 text-start">Nama Barang</th>
                        <th>Kategori</th>
                        <th>Jumlah Stok</th>
                        <th>Status</th>
                        <th class="pe-4">Penyesuaian Stok</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${stokList}">
                        <td class="ps-4 text-start">
                            <p class="mb-0 fw-bold" th:text="${s.barang.namaBarang}"></p>
                            <small class="text-muted" th:text="${s.barang.idBarang}"></small>
                        </td>
                        <td th:text="${s.barang.kategori}"></td>
                        <td class="fw-bold fs-5" th:text="${s.jumlahStok}"></td>
                        <td>
                            <span th:if="${s.jumlahStok <= 10}" class="badge bg-danger rounded-pill px-3 py-2">Stok Menipis</span>
                            <span th:if="${s.jumlahStok > 10}" class="badge bg-success rounded-pill px-3 py-2">Aman</span>
                        </td>
                        <td class="pe-4">
                            <div class="d-flex justify-content-center gap-2">
                                <form th:action="@{/stok/kurang/{id}(id=${s.idStok})}" method="post">
                                    <button class="btn btn-outline-danger fw-bold" style="width: 40px; border-radius: 8px;">-</button>
                                </form>
                                <form th:action="@{/stok/tambah/{id}(id=${s.idStok})}" method="post">
                                    <button class="btn btn-toko fw-bold" style="width: 40px; border-radius: 8px;">+</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
