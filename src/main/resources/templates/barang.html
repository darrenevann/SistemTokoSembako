<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daftar Produk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokopedia-theme.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-toko sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard">Sistem Sembako</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-4">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/barang">Barang</a></li>
                <li class="nav-item"><a class="nav-link" href="/stok">Stok</a></li>
                <li class="nav-item"><a class="nav-link" href="/transaksi">Transaksi</a></li>
                <li class="nav-item"><a class="nav-link" href="/pelanggan">Pelanggan</a></li>
                <li class="nav-item"><a class="nav-link" href="/laporan/keuangan">Laporan</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-5 mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold m-0">Daftar Produk</h3>
        <button class="btn-toko" data-bs-toggle="modal" data-bs-target="#modalTambahBarang">Tambah Produk</button>
    </div>

    <div class="modal fade" id="modalTambahBarang" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 12px; box-shadow: var(--toko-shadow);">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Tambah Produk Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3">
                    <form action="/barang/add" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold small">Nama Produk</label>
                            <input class="form-control form-control-toko" name="namaBarang" placeholder="Contoh: Beras Premium 5kg" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted fw-bold small">Harga Modal (Rp)</label>
                                <input class="form-control form-control-toko" type="number" min="1" name="hargaModal" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted fw-bold small">Harga Jual (Rp)</label>
                                <input class="form-control form-control-toko" type="number" min="1" name="hargaSatuan" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold small">Kategori</label>
                            <input class="form-control form-control-toko" name="kategori" placeholder="Contoh: Sembako" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small">Foto Produk</label>
                            <input type="file" name="gambarFile" class="form-control form-control-toko" accept="image/*" required>
                        </div>
                        <button class="btn-toko w-100 py-2">Simpan Produk</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="card-toko">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-toko mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Info Produk</th>
                            <th>Kategori</th>
                            <th>Harga Modal</th>
                            <th>Harga Jual</th>
                            <th>Potensi Laba</th>
                            <th class="pe-4 text-end">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${barangList}">
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <img th:if="${b.gambar != null}" th:src="@{'/images/' + ${b.gambar}}" style="width: 48px; height: 48px; object-fit: cover; border-radius: 6px; border: 1px solid var(--toko-border);">
                                    <div th:if="${b.gambar == null}" style="width: 48px; height: 48px; background: #E5E7E9; border-radius: 6px; display:flex; align-items:center; justify-content:center;">
                                        <span class="small text-muted">No IMG</span>
                                    </div>
                                    <div class="ms-3">
                                        <p class="mb-0 fw-bold" th:text="${b.namaBarang}">Nama Barang</p>
                                        <small class="text-muted" th:text="${b.idBarang}">ID</small>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${b.kategori}">Kategori</td>
                            <td>Rp <span th:text="${#numbers.formatDecimal(b.hargaModal, 0, 'COMMA', 0, 'POINT')}"></span></td>
                            <td class="fw-bold">Rp <span th:text="${#numbers.formatDecimal(b.hargaSatuan, 0, 'COMMA', 0, 'POINT')}"></span></td>
                            <td class="text-success fw-bold">Rp <span th:text="${#numbers.formatDecimal((b.hargaSatuan - b.hargaModal), 0, 'COMMA', 0, 'POINT')}"></span></td>
                            <td class="pe-4 text-end">
                                <a class="btn btn-outline-danger btn-sm fw-bold" style="border-radius: 6px;" th:href="@{/barang/delete/{id}(id=${b.idBarang})}">Hapus</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
