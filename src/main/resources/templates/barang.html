<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Data Barang</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/dashboard">

            Sistem Sembako

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon">
            </span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/dashboard">

                        Dashboard

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="/barang">

                        Barang

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/stok">

                        Stok

                    </a>

                </li>



                <li class="nav-item">

                    <a class="nav-link"
                       href="/laporan/keuangan">

                        Laporan Keuangan

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link text-danger"
                       href="/logout">

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-4">

    <h2>Data Barang</h2>

    <div class="card">

        <div class="card-body">

            <form action="/barang/add"
                method="post"
                enctype="multipart/form-data">

                <input class="form-control mb-2"
                    name="namaBarang"
                    placeholder="Nama Barang"
                    required>

                <input class="form-control mb-2"
                    type="number"
                    min="1"
                    name="hargaModal"
                    placeholder="Harga Modal"
                    required>

                <input class="form-control mb-2"
                    type="number"
                    min="1"
                    name="hargaSatuan"
                    placeholder="Harga Jual"
                    required>

                <input class="form-control mb-2"
                    name="kategori"
                    placeholder="Kategori"
                    required>

                <label class="form-label">
                    Gambar Produk
                </label>

                <input type="file"
                    name="gambarFile"
                    class="form-control mb-3"
                    accept="image/*"
                    required>

                <button class="btn btn-success">

                    Tambah Barang

                </button>

            </form>

        </div>

    </div>

    <hr>

    <table class="table table-bordered table-striped">

        <thead>

        <tr>

            <th>ID Barang</th>
            <th>Nama Barang</th>
            <th>Harga Modal</th>
            <th>Harga Jual</th>
            <th>Kategori</th>
            <th>Laba / Item</th>
            <th>Aksi</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="b : ${barangList}">


<td>

    <img th:if="${b.gambar != null}"
         th:src="@{'/images/' + ${b.gambar}}"
         width="80"
         height="80"
         class="rounded border">

    <span th:if="${b.gambar == null}">
        Tidak Ada Gambar
    </span>

</td>





            <td th:text="${b.idBarang}">
            </td>

            <td th:text="${b.namaBarang}">
            </td>

            <td>

                Rp.
                <span th:text="${b.hargaModal}">
                </span>

            </td>

            <td>

                Rp.
                <span th:text="${b.hargaSatuan}">
                </span>

            </td>

            <td th:text="${b.kategori}">
            </td>

            <td>

                Rp.
                <span th:text="${b.hargaModal != null ? b.hargaSatuan - b.hargaModal : 0}">
                </span>

            </td>

            <td>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/barang/delete/{id}(id=${b.idBarang})}">

                    Hapus

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>




</body>

</html>
