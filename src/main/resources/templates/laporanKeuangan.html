<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Laporan Keuangan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/dashboard">

            Sistem Sembako

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon">
            </span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/dashboard">

                        Dashboard

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/barang">

                        Barang

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/stok">

                        Stok

                    </a>

                </li>



                <li class="nav-item">

                    <a class="nav-link"
                       href="/laporan/keuangan">

                        Laporan Keuangan

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link text-danger"
                       href="/logout">

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>
<body>

<div class="container mt-4">

<h2>Laporan Keuangan</h2>

<div class="row">

    <div class="col-md-4">

        <div class="card text-bg-success">

            <div class="card-body">

                <h5>Omset Kotor</h5>

                <h3>
                    Rp.
                    <span th:text="${omset}">
                    </span>
                </h3>

            </div>

        </div>

    </div>

    <div class="col-md-4">



    </div>

    <div class="col-md-4">

        <div class="card text-bg-primary">

            <div class="card-body">

                <h5>Omset Bersih</h5>

                <h3>
                    Rp.
                    <span th:text="${omsetBersih}">
                    </span>
                </h3>

            </div>

        </div>

    </div>

</div>

<br>

<div class="card">

    <div class="card-body">

        <h4>Produk Terlaris</h4>

        <table class="table table-bordered">

            <thead>

            <tr>

                <th>Barang</th>
                <th>Total Terjual</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="p : ${produkTerlaris}">

                <td th:text="${p[0]}">
                </td>

                <td th:text="${p[1]}">
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<br>

<div class="card">

    <div class="card-body">

        <h4>Stok Menipis</h4>

        <table class="table table-bordered">

            <thead>

            <tr>

                <th>Barang</th>
                <th>Stok</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="s : ${stokMenipis}">

                <td th:text="${s.barang.namaBarang}">
                </td>

                <td>

                    <span class="badge bg-danger"
                          th:text="${s.jumlahStok}">
                    </span>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</div>

</div>

</div>

</body>
</html>
