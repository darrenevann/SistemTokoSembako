<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Laporan Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokopedia-theme.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-toko sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard">Sistem Sembako</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-4">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/barang">Barang</a></li>
                <li class="nav-item"><a class="nav-link" href="/stok">Stok</a></li>
                <li class="nav-item"><a class="nav-link" href="/transaksi">Transaksi</a></li>
                <li class="nav-item"><a class="nav-link" href="/pelanggan">Pelanggan</a></li>
                <li class="nav-item"><a class="nav-link active" href="/laporan/keuangan">Laporan</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-danger fw-bold" href="/logout">Keluar</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-5 mt-4">
    <h3 class="mb-4 fw-bold">Laporan Keuangan</h3>

    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card-toko p-4" style="border-left: 6px solid var(--toko-green);">
                <p class="text-muted fw-bold mb-1">Pendapatan Kotor (Omset)</p>
                <h1 class="fw-bold text-success mb-0">Rp <span th:text="${#numbers.formatDecimal(omset, 0, 'COMMA', 0, 'POINT')}"></span></h1>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-toko p-4" style="border-left: 6px solid #0056b3;">
                <p class="text-muted fw-bold mb-1">Pendapatan Bersih (Laba)</p>
                <h1 class="fw-bold text-primary mb-0">Rp <span th:text="${#numbers.formatDecimal(omsetBersih, 0, 'COMMA', 0, 'POINT')}"></span></h1>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card-toko">
                <div class="card-header-toko">Performa Produk Terlaris</div>
                <div class="card-body p-0">
                    <table class="table table-toko mb-0">
                        <thead>
                        <tr>
                            <th class="ps-4">Nama Produk</th>
                            <th class="pe-4 text-end">Total Terjual (Kuantitas)</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="p : ${produkTerlaris}">
                            <td class="ps-4 fw-bold" th:text="${p[0]}"></td>
                            <td class="pe-4 text-end">
                                <span class="badge bg-success rounded-pill px-3 py-2" th:text="${p[1]} + ' Unit'"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card-toko">
                <div class="card-header-toko text-danger">Peringatan Stok Menipis</div>
                <div class="card-body p-0">
                    <table class="table table-toko mb-0">
                        <thead>
                        <tr>
                            <th class="ps-4">Nama Produk</th>
                            <th class="pe-4 text-end">Sisa Stok</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="s : ${stokMenipis}">
                            <td class="ps-4 fw-bold" th:text="${s.barang.namaBarang}"></td>
                            <td class="pe-4 text-end">
                                <span class="badge bg-danger rounded-pill px-3 py-2" th:text="${s.jumlahStok}"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
