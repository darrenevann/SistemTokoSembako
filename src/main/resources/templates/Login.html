<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login Sistem Sembako</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokopedia-theme.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            width: 100%;
            max-width: 400px;
            padding: 32px;
            background: #FFFFFF;
            border: 1px solid var(--toko-border);
            border-radius: 12px;
            box-shadow: var(--toko-shadow);
        }
    </style>
</head>
<body>

<div class="container-fluid login-container">
    <div class="card-login">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-success" style="color: var(--toko-green) !important;">Sistem Sembako</h3>
            <p class="text-muted small fw-semibold">Silakan masuk ke akun admin/owner Anda</p>
        </div>
        
        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label text-muted fw-bold small">Username</label>
                <input type="text" class="form-control form-control-toko" name="username" placeholder="Masukkan username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted fw-bold small">Password</label>
                <input type="password" class="form-control form-control-toko" name="password" placeholder="Masukkan password" required>
            </div>
            <button class="btn-toko w-100 py-2 fs-6" type="submit">Masuk</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
