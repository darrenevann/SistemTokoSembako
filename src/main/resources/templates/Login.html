<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Login Sistem Sembako</h2>

    <form action="/login"
          method="post">

        <div class="mb-3">

            <label>Username</label>

            <input type="text"
                   class="form-control"
                   name="username">

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input type="password"
                   class="form-control"
                   name="password">

        </div>

        <button class="btn btn-primary"
                type="submit">

            Login

        </button>

    </form>

</div>

</body>
</html>
