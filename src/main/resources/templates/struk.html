<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Struk Pembelian</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokopedia-theme.css">
    <style>
        .struk-box {
            max-width: 550px;
            margin: 40px auto;
        }
        @media print {
            .no-print {
                display: none !important;
            }
            body {
                background-color: #FFFFFF !important;
            }
            .card-toko {
                box-shadow: none !important;
                border: none !important;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="card-toko struk-box p-4">
        <div class="text-center mb-4">
            <h4 class="fw-bold mb-1" style="color: var(--toko-green);">TOKO SEMBAKO</h4>
            <p class="text-muted small mb-0">Struk Resmi Bukti Pembelian</p>
        </div>
        
        <hr style="border-top: 1px dashed var(--toko-border); opacity: 1;">
        
        <div class="row g-2 mb-3 small fw-semibold text-muted">
            <div class="col-6">
                No Transaksi : <span class="text-dark fw-bold" th:text="${transaksi.idTransaksi}"></span>
            </div>
            <div class="col-6 text-end">
                Tanggal : <span class="text-dark fw-bold" th:text="${transaksi.tanggalTransaksi}"></span>
            </div>
            <div class="col-12 mt-1">
                Pelanggan : <span class="text-dark fw-bold" th:text="${transaksi.pelanggan.namaPelanggan}"></span>
            </div>
        </div>
        
        <hr style="border-top: 1px dashed var(--toko-border); opacity: 1;">
        
        <table class="table table-toko table-borderless mb-3">
            <thead>
                <tr class="border-bottom">
                    <th class="text-start ps-0">Barang</th>
                    <th class="text-center">Qty</th>
                    <th class="text-end pe-0">Total</th>
                </tr>
            </thead>
            <tbody>
                <tr class="align-middle">
                    <td class="text-start ps-0 fw-bold" th:text="${transaksi.barang.namaBarang}">Nama Barang</td>
                    <td class="text-center" th:text="${transaksi.kuantitas}">1</td>
                    <td class="text-end pe-0 fw-bold text-success">Rp <span th:text="${#numbers.formatDecimal(transaksi.totalHarga, 0, 'COMMA', 0, 'POINT')}"></span></td>
                </tr>
            </tbody>
        </table>
        
        <hr style="border-top: 1px dashed var(--toko-border); opacity: 1;">
        
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="text-muted fw-bold small">Metode Pembayaran</span>
            <span class="badge bg-secondary px-3 py-1 fw-bold" th:text="${transaksi.metodePembayaran}">Cash</span>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <span class="text-dark fw-bold fs-5">Total Belanja</span>
            <span class="text-success fw-bold fs-4" style="color: var(--toko-green) !important;">Rp <span th:text="${#numbers.formatDecimal(transaksi.totalHarga, 0, 'COMMA', 0, 'POINT')}"></span></span>
        </div>
        
        <div class="text-center mt-3 no-print">
            <button onclick="window.print()" class="btn-toko px-4 py-2 w-100">Cetak Struk</button>
            <a href="/transaksi" class="btn btn-toko-outline w-100 mt-2 py-2">Kembali ke Transaksi</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
