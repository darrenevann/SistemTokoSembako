<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Dashboard Owner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container-fluid">

        <a class="navbar-brand"
           href="/dashboard">

            Sistem Sembako

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon">
            </span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link active"
                       href="/dashboard">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/barang">
                        Barang
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/stok">
                        Stok
                    </a>
                </li>

 



                <li class="nav-item">
                    <a class="nav-link"
                       href="/laporan/keuangan">
                        Laporan Keuangan
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-danger"
                       href="/logout">
                        Logout
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-4">

    <h2 class="mb-4">
        Dashboard Owner
    </h2>

    <div class="row">

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h5>Total Barang</h5>

                    <h2 th:text="${totalBarang}">
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h5>Total Stok</h5>

                    <h2 th:text="${totalStok}">
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h5>Total Transaksi</h5>

                    <h2 th:text="${totalTransaksi}">
                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h5>Omset Kotor</h5>

                    <h5>

                        Rp.

                        <span th:text="${omsetKotor}">
                        </span>

                    </h5>

                </div>

            </div>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-body">

            <h4>

                Omset Bersih :

                Rp.

                <span th:text="${omsetBersih}">
                </span>

            </h4>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-body">

            <h4>
                Produk Terlaris
            </h4>

            <table class="table table-bordered table-striped">

                <thead>

                <tr>

                    <th>Nama Barang</th>
                    <th>Total Terjual</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="p : ${produkTerlaris}">

                    <td th:text="${p[0]}">
                    </td>

                    <td th:text="${p[1]}">
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <br>

    <div class="card shadow">

        <div class="card-body">

            <h4>
                Grafik Penjualan Bulanan
            </h4>

            <canvas id="salesChart">
            </canvas>

        </div>

    </div>

</div>

<script th:inline="javascript">

    let grafikData = /*[[${grafikPenjualan}]]*/ [];

    let labels = [];

    let dataPenjualan = [];

    grafikData.forEach(function(item){

        labels.push(
            "Bulan " + item[0]
        );

        dataPenjualan.push(
            item[1]
        );

    });

    new Chart(
        document.getElementById('salesChart'),
        {
            type: 'bar',

            data: {

                labels: labels,

                datasets: [{

                    label: 'Jumlah Transaksi',

                    data: dataPenjualan

                }]

            }
        }
    );

</script>

</body>

</html>
