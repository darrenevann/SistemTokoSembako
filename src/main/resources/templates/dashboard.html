<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Owner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/tokopedia-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-toko sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/dashboard">Sistem Sembako</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-4">
                <li class="nav-item"><a class="nav-link active" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/barang">Barang</a></li>
                <li class="nav-item"><a class="nav-link" href="/stok">Stok</a></li>
                <li class="nav-item"><a class="nav-link" href="/transaksi">Transaksi</a></li>
                <li class="nav-item"><a class="nav-link" href="/pelanggan">Pelanggan</a></li>
                <li class="nav-item"><a class="nav-link" href="/laporan/keuangan">Laporan</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-danger fw-bold" href="/logout">Keluar</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-5 mt-4">
    <h3 class="mb-4 fw-bold">Ringkasan Toko</h3>

    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card-toko h-100 p-3">
                <p class="text-muted fw-bold mb-1">Total Barang</p>
                <h2 class="fw-bold mb-0" th:text="${totalBarang}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-toko h-100 p-3">
                <p class="text-muted fw-bold mb-1">Total Stok</p>
                <h2 class="fw-bold mb-0" th:text="${totalStok}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-toko h-100 p-3">
                <p class="text-muted fw-bold mb-1">Total Transaksi</p>
                <h2 class="fw-bold mb-0" th:text="${totalTransaksi}">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card-toko h-100 p-3">
                <p class="text-muted fw-bold mb-1">Omset Kotor</p>
                <h2 class="fw-bold mb-0 text-success">Rp <span th:text="${#numbers.formatDecimal(omsetKotor, 0, 'COMMA', 0, 'POINT')}">0</span></h2>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card-toko">
                <div class="card-header-toko border-0 pb-0">
                    Grafik Penjualan Bulanan
                </div>
                <div class="card-body">
                    <canvas id="salesChart" height="100"></canvas>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card-toko h-100">
                <div class="card-header-toko border-0 pb-0">
                    Laba Bersih
                </div>
                <div class="card-body">
                    <h1 class="fw-bold text-success mb-4">Rp <span th:text="${#numbers.formatDecimal(omsetBersih, 0, 'COMMA', 0, 'POINT')}">0</span></h1>
                    
                    <h6 class="fw-bold mt-4 mb-3">Produk Terlaris</h6>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0" th:each="p : ${produkTerlaris}">
                            <span class="fw-semibold" th:text="${p[0]}">Nama Barang</span>
                            <span class="badge bg-success rounded-pill" th:text="${p[1]} + ' Terjual'">0 Terjual</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    let grafikData = /*[[${grafikPenjualan}]]*/ [];
    let labels = [];
    let dataPenjualan = [];

    grafikData.forEach(function(item){
        labels.push("Bulan " + item[0]);
        dataPenjualan.push(item[1]);
    });

    new Chart(document.getElementById('salesChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Jumlah Transaksi',
                data: dataPenjualan,
                borderColor: '#00AA5B',
                backgroundColor: 'rgba(0, 170, 91, 0.1)',
                borderWidth: 3,
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, grid: { borderDash: [5, 5] } }, x: { grid: { display: false } } }
        }
    });
</script>
</body>
</html>
